name: travel-mapper
services:
  web:
    image: butlerx/travel-mapper
    build: .
    env_file: .env
    ports:
      - 8080:8080
    command: fastapi dev --host 0.0.0.0 --port 8080 /app/main.py
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: ./uv.lock
