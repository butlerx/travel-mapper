[tools]
rust                   = { version = "stable", profile = "default", components = "rust-analyzer" }
node                   = "lts"
prek                   = "latest"
taplo                  = "latest"
zizmor                 = "latest"
"cargo:cargo-binstall" = "latest"
"cargo:cargo-nextest"  = "0.9.129"
"cargo:cargo-watch"    = "latest"
"cargo:sqlx-cli"       = { version = "latest", features = "sqlite" }
"npm:prettier"         = "latest"
"npm:typescript"       = "latest"
protoc                 = "latest"

[env]
_.file = ".env"

[tasks.build]
description = "Build the project"
usage       = 'arg "[args]" var=#true help="Additional arguments passed to cargo build"'
run         = "cargo build ${usage_args:-}"
alias       = "b"
sources     = ["Cargo.lock", "Cargo.toml", "src/**/*.rs"]
outputs     = ["target/debug/travel-mapper"]


[tasks."build:release"]
description = "Build release binary"
usage       = 'arg "[args]" var=#true help="Additional arguments passed to cargo build"'
run         = "cargo build --release ${usage_args:-}"
sources     = ["Cargo.lock", "Cargo.toml", "src/**/*.rs"]
outputs     = ["target/release/travel-mapper"]

[tasks.dev]
description = "Start server and sync worker together"
depends     = ["seed", "serve", "worker"]
wait_for    = []

[tasks.serve]
description = "Start the server with auto-reload on changes"
run         = "cargo watch -x 'run -- serve'"

[tasks.worker]
description = "Start the background sync worker"
run         = "cargo run -- worker"

[tasks.lint]
description = "Lint code with clippy"
usage       = 'arg "[args]" var=#true help="Additional arguments passed to cargo clippy"'
run         = "cargo clippy --all-targets --all-features ${usage_args:-} -- -D warnings"

[tasks."lint:fix"]
description = "Fix lint issues"
usage       = 'arg "[args]" var=#true help="Additional arguments passed to cargo clippy"'
run         = "cargo clippy --fix --all-targets --all-features --allow-staged ${usage_args:-} -- -D warnings"

[tasks.format]
description = "Format Rust code with cargo fmt and JS/CSS with Prettier"
run         = ["cargo fmt", "prettier --write 'static/**/*.js' 'static/**/*.css'"]
alias       = "f"
sources     = ["static/**/*.js", "static/**/*.css", "src/**/*.rs"]

[tasks."format:check"]
description = "Check Rust code formatting with cargo fmt and JS/CSS with Prettier"
run = [
  "cargo fmt --check ",
  "prettier --check 'static/**/*.js' 'static/**/*.css'",
]
sources = ["static/**/*.js", "static/**/*.css", "src/**/*.rs"]

[tasks.typecheck]
description = "Type-check JS files with TypeScript"
run         = "tsc --noEmit"
sources     = ["static/**/*.js", "tsconfig.json"]

[tasks.check]
description = "Run all checks (lint + format + typecheck)"
depends     = ["lint", "format:check", "typecheck"]

[tasks.test]
description = "Run tests with cargo"
usage       = 'arg "[args]" var=#true help="Additional arguments passed to cargo test"'
run         = "cargo nextest run --all-targets --all-features ${usage_args:-}"
alias       = "t"

[tasks."db:create"]
description = "Create the SQLite database"
run         = "sqlx database create"

[tasks."db:migrate"]
description = "Run database migrations"
run         = "sqlx migrate run"
depends     = ["db:create"]

[tasks."db:reset"]
description = "Drop and recreate the database, then run migrations"
run         = ["sqlx database drop -y", "sqlx database create", "sqlx migrate run"]

[tasks."db:prepare"]
description = "Generate .sqlx/ query cache for offline compile-time checking"
run         = "cargo sqlx prepare -- --all-targets"
depends     = ["db:migrate"]
sources     = ["src/**/*.rs", "migrations/*.sql"]
outputs     = [".sqlx/*.json"]

[tasks.seed]
description = "Seed the database with test users for local development"
run         = "cargo run -- seed"
depends     = ["db:migrate"]

[tasks.clean]
description = "Clean build artifacts"
run         = "rm -rf target"

[tasks."ci:release-build"]
description = "Build release binary, using cross for cross-compilation when CROSS=true"
usage = 'arg "<target>" help="Rust target triple"'
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ "${CROSS:-}" = "true" ]; then
  cross build --release --target "${usage_args}"
else
  cargo build --release --target "${usage_args}"
fi
'''
hide = true

[tasks."ci:package"]
description = "Package a release binary into a .tar.gz archive"
usage       = 'arg "<target>" help="Rust target triple"'
run         = "tar czf travel-mapper-${usage_args}.tar.gz -C target/${usage_args}/release travel_mapper"
hide        = true

[tasks."ci:publish"]
description = "Create a GitHub Release and upload artifacts"
usage       = 'arg "<tag>" help="Git tag for the release"'
run         = "gh release create ${usage_args} --title ${usage_args} --generate-notes artifacts/*.tar.gz"
hide        = true
