{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <h2>Login</h2>
    {% if error %}
        <div class="error">{{ error | unquote_plus }}</div>
    {% endif %}
    {% if message %}
        <div class="success">{{ message | unquote_plus }}</div>
    {% endif %}
    <form method="POST" action="/user/login" enctype="multipart/form-data">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="/user/register">Register here</a></p>
{% endblock %}
